document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

3, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* =====================================================================\n   Свадебный сайт — Ульяна & Владислав\n   Система тем: ivanhoe (Айвенго) · contrast (Контраст) · botanika (Боттаника)\n   ===================================================================== */\n\n/* ----------------------------- Reset ------------------------------- */\n*, *::before, *::after { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nimg { display: block; max-width: 100%; }\nbutton { font: inherit; color: inherit; cursor: pointer; }\ninput, select, textarea, button { font-family: inherit; }\n\n/* --------------------------- Type tokens --------------------------- */\n:root {\n  --font-script: 'Marck Script', cursive;\n  --font-caps: 'Tenor Sans', sans-serif;\n  --font-serif: 'Cormorant Garamond', Georgia, serif;\n  --font-body: 'Manrope', system-ui, sans-serif;\n\n  --page-w: 500px;\n  --pad: clamp(22px, 7vw, 40px);\n\n  --ease: cubic-bezier(.22,.61,.36,1);\n}\n\n/* ===================== THEME · Айвенго (default) ==================== */\n[data-theme=\"ivanhoe\"] {\n  --bg:        #E5DECF;\n  --paper:     #F1EBDF;\n  --surface:   #F7F2E8;\n  --ink:       #24211B;\n  --muted:     #726C5E;\n  --line:      #D9D0BF;\n  --olive:     #8B8755;\n  --gold:      #BCA063;\n  --rose:      #C2908A;\n  --accent:    #8B8755;   /* olive */\n  --accent-2:  #BCA063;   /* gold  */\n  --frame:     #BCA063;   /* portrait frame */\n  --paper-tint: 42, 38, 28;\n}\n\n/* ===================== THEME · Контраст (dark) ===================== */\n[data-theme=\"contrast\"] {\n  --bg:        #131A14;\n  --paper:     #1C241B;\n  --surface:   #243021;\n  --ink:       #EFE8D6;\n  --muted:     #A7A48E;\n  --line:      rgba(233,225,201,.16);\n  --olive:     #A9AB6F;\n  --gold:      #CBA868;\n  --rose:      #D29A90;\n  --accent:    #CBA868;   /* gold */\n  --accent-2:  #A9AB6F;   /* olive */\n  --frame:     #CBA868;\n  --paper-tint: 235, 226, 200;\n}\n\n/* ===================== THEME · Боттаника (rose) ==================== */\n[data-theme=\"botanika\"] {\n  --bg:        #E7DCD4;\n  --paper:     #F5EDE7;\n  --surface:   #FAF3EE;\n  --ink:       #3A322D;\n  --muted:     #8B7E75;\n  --line:      #E2D5CB;\n  --olive:     #93A07C;\n  --gold:      #C2A06A;\n  --rose:      #C0857E;\n  --accent:    #C0857E;   /* rose */\n  --accent-2:  #93A07C;   /* sage */\n  --frame:     #C2A06A;\n  --paper-tint: 70, 52, 44;\n}\n\n/* ----------------------------- Base -------------------------------- */\nbody {\n  background: var(--bg);\n  color: var(--ink);\n  font-family: var(--font-body);\n  font-weight: 400;\n  line-height: 1.65;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* The phone-width \"paper\" column, centered on a tinted backdrop */\n.page {\n  position: relative;\n  max-width: var(--page-w);\n  margin: 0 auto;\n  min-height: 100vh;\n  background-color: var(--paper);\n  background-image:\n    radial-gradient(120% 70% at 50% -10%, rgba(var(--paper-tint), .05), transparent 60%),\n    radial-gradient(140% 80% at 50% 110%, rgba(var(--paper-tint), .06), transparent 55%),\n    url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/><\u002Ffilter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/><\u002Fsvg>\");\n  box-shadow: 0 0 80px rgba(0,0,0,.10);\n  overflow: hidden;\n}\n\nsection { padding: clamp(54px, 13vw, 84px) var(--pad); position: relative; }\n\n/* --------------------------- Typography ---------------------------- */\n.eyebrow {\n  font-family: var(--font-caps);\n  text-transform: uppercase;\n  letter-spacing: .42em;\n  font-size: 12px;\n  color: var(--accent-2);\n  margin: 0;\n  padding-left: .42em;\n}\n[data-theme=\"ivanhoe\"] .eyebrow { color: var(--olive); }\n[data-theme=\"botanika\"] .eyebrow { color: var(--olive); }\n\n.script {\n  font-family: var(--font-script);\n  font-weight: 400;\n  font-synthesis: none;\n  line-height: 1.05;\n  color: var(--ink);\n}\n/* Marck Script ships a single (400) weight — never let the browser fake-bold it */\n.hero__date, .hero__names, .foot__mono, .rsvp__success .script { font-weight: 400; font-synthesis: none; }\n\n.section-title {\n  font-family: var(--font-serif);\n  font-weight: 500;\n  font-size: clamp(30px, 9vw, 42px);\n  line-height: 1.08;\n  margin: 14px 0 0;\n  letter-spacing: .005em;\n}\n\n.lead {\n  color: var(--muted);\n  font-size: 16px;\n  margin: 16px 0 0;\n  max-width: 38ch;\n  text-wrap: pretty;\n}\n\n.center { text-align: center; }\n.center .lead { margin-left: auto; margin-right: auto; }\n\n/* ornamental divider */\n.flourish {\n  display: flex; align-items: center; justify-content: center; gap: 14px;\n  margin: 26px 0;\n}\n.flourish::before, .flourish::after {\n  content: \"\"; height: 1px; width: 56px;\n  background: linear-gradient(to var(--dir, right), transparent, var(--line));\n}\n.flourish::after { --dir: left; }\n.flourish .dot { width: 5px; height: 5px; transform: rotate(45deg); background: var(--accent-2); }\n\n/* ============================= HERO ================================ */\n/* Hero is a fixed warm-cream band (matches the illustration's background)\n   with dark ink text, independent of the active theme. */\n.hero {\n  text-align: center;\n  background: #F3EDE2;\n  color: #23201B;\n  padding-top: clamp(34px, 9vw, 56px);\n  padding-bottom: clamp(40px, 11vw, 60px);\n}\n.hero__badge {\n  font-family: var(--font-caps); letter-spacing: .3em; text-transform: uppercase;\n  font-size: 11px; color: #8B8755;\n}\n.hero__date {\n  font-family: var(--font-script);\n  font-size: clamp(44px, 15vw, 68px);\n  line-height: 1; margin: 14px 0 4px;\n  letter-spacing: .04em;\n  color: #23201B;\n}\n.hero__art {\n  width: 100%;\n  max-width: 440px;\n  margin: 18px auto 14px;\n  display: block;\n  /* мягко растворяем края картинки в кремовом фоне шапки */\n  -webkit-mask-image:\n    linear-gradient(to right, transparent 0, #000 11%, #000 89%, transparent 100%),\n    linear-gradient(to bottom, transparent 0, #000 9%, #000 88%, transparent 100%);\n  mask-image:\n    linear-gradient(to right, transparent 0, #000 11%, #000 89%, transparent 100%),\n    linear-gradient(to bottom, transparent 0, #000 9%, #000 88%, transparent 100%);\n  -webkit-mask-composite: source-in;\n  mask-composite: intersect;\n}\n.hero__join {\n  font-family: var(--font-caps); text-transform: uppercase;\n  letter-spacing: .32em; font-size: 12px; color: #8B8755; margin: 6px 0 14px;\n}\n.hero__names {\n  font-family: var(--font-script);\n  font-size: clamp(46px, 16vw, 74px);\n  line-height: 1.02; margin: 0; color: #23201B;\n  text-wrap: balance;\n}\n.hero__amp { color: #8B8755; font-style: normal; }\n.hero__place {\n  margin-top: 16px; color: #6E6A5C; font-size: 14px;\n  letter-spacing: .04em;\n}\n.scroll-cue {\n  margin: 34px auto 0; width: 1px; height: 46px;\n  background: linear-gradient(rgba(35,32,27,.28), transparent);\n  position: relative;\n}\n.scroll-cue::after {\n  content: \"\"; position: absolute; left: 50%; top: 0; width: 5px; height: 5px;\n  border-radius: 50%; background: #8B8755; transform: translateX(-50%);\n  animation: drop 2.4s var(--ease) infinite;\n}\n@keyframes drop { 0%{top:0;opacity:0} 20%{opacity:1} 80%{opacity:1} 100%{top:42px;opacity:0} }\n\n/* ========================== COUNTDOWN ============================== */\n.countdown { text-align: center; }\n.countdown__grid {\n  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;\n  max-width: 380px; margin: 30px auto 0;\n}\n.cd-cell {\n  background: var(--surface); border: 1px solid var(--line);\n  border-radius: 4px; padding: 18px 4px 12px;\n}\n.cd-num {\n  font-family: var(--font-serif); font-weight: 500;\n  font-size: clamp(30px, 10vw, 42px); line-height: 1; color: var(--ink);\n  font-variant-numeric: tabular-nums;\n}\n.cd-lbl {\n  font-family: var(--font-caps); text-transform: uppercase;\n  letter-spacing: .18em; font-size: 10px; color: var(--muted); margin-top: 8px;\n}\n\n/* =========================== TIMING ================================ */\n.timing { text-align: center; }\n.timing__hero { margin: 26px 0 16px; }\n.timing__lead-in {\n  display: block; font-family: var(--font-caps); text-transform: uppercase;\n  letter-spacing: .22em; font-size: 12px; color: var(--muted);\n}\n.timing__big {\n  display: block; margin-top: 8px; font-family: var(--font-script);\n  font-size: clamp(58px, 19vw, 88px); line-height: 1; color: var(--accent);\n  letter-spacing: .02em;\n}\n.secret-card {\n  margin: 30px auto 0; max-width: 380px;\n  border: 1px dashed var(--accent); border-radius: 10px;\n  padding: 22px 24px; background: var(--surface);\n}\n.secret-card__label {\n  display: block; margin-bottom: 9px; font-family: var(--font-caps);\n  text-transform: uppercase; letter-spacing: .24em; font-size: 10px; color: var(--accent);\n}\n.secret-card p { margin: 0; color: var(--ink); font-size: 14.5px; line-height: 1.6; text-wrap: pretty; }\n.secret-card strong { color: var(--accent); font-weight: 600; }\n\n/* =========================== LOCATION ============================== */\n.loc__card {\n  margin-top: 26px; border: 1px solid var(--line); border-radius: 6px;\n  overflow: hidden; background: var(--surface);\n}\n.map-embed { position: relative; line-height: 0; background: var(--surface); }\n.map-embed iframe { width: 100%; height: 320px; border: 0; display: block; filter: saturate(.92); }\n.loc__body { padding: 22px var(--pad) 24px; text-align: center; }\n.loc__venue { font-family: var(--font-serif); font-size: 26px; font-weight: 500; }\n.loc__addr { color: var(--muted); font-size: 14px; margin: 6px 0 18px; }\n\n/* ============================ BUTTONS ============================== */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 10px;\n  font-family: var(--font-caps); text-transform: uppercase;\n  letter-spacing: .2em; font-size: 12px;\n  padding: 15px 30px; border-radius: 2px;\n  border: 1px solid var(--accent); color: var(--accent);\n  background: transparent; transition: all .35s var(--ease); text-decoration: none;\n}\n.btn:hover { background: var(--accent); color: var(--paper); }\n.btn--solid { background: var(--accent); color: var(--paper); border-color: var(--accent); }\n.btn--solid:hover { filter: brightness(1.08); }\n.btn--full { width: 100%; }\n\n/* =========================== DRESS CODE ============================ */\n.dress { text-align: center; }\n.swatches {\n  display: flex; justify-content: center; gap: 14px; margin: 30px 0 8px;\n  flex-wrap: wrap;\n}\n.swatch { text-align: center; }\n.swatch__chip {\n  width: 56px; height: 56px; border-radius: 50%;\n  box-shadow: inset 0 0 0 1px rgba(var(--paper-tint),.12), 0 8px 18px rgba(0,0,0,.10);\n  margin: 0 auto 8px;\n}\n.swatch__name {\n  font-family: var(--font-body); font-size: 10px; letter-spacing: .08em;\n  text-transform: uppercase; color: var(--muted);\n}\n.dress__note { color: var(--muted); font-size: 13px; }\n\n/* ============================== RSVP =============================== */\n.rsvp { background: var(--surface); }\n.rsvp__form { margin-top: 28px; display: flex; flex-direction: column; gap: 22px; }\n.field { display: flex; flex-direction: column; gap: 9px; }\n.field > label.field__q,\n.field__q {\n  font-family: var(--font-caps); text-transform: uppercase;\n  letter-spacing: .14em; font-size: 11px; color: var(--ink);\n}\n.field input[type=\"text\"] {\n  background: transparent; border: none; border-bottom: 1px solid var(--line);\n  padding: 10px 2px; font-size: 16px; color: var(--ink); outline: none;\n  transition: border-color .3s var(--ease);\n}\n.field input[type=\"text\"]::placeholder { color: var(--muted); opacity: .7; }\n.field input[type=\"text\"]:focus { border-color: var(--accent); }\n\n/* segmented option chips */\n.opts { display: flex; flex-wrap: wrap; gap: 8px; }\n.opt {\n  position: relative; flex: 1 1 auto;\n}\n.opt input { position: absolute; opacity: 0; pointer-events: none; }\n.opt span {\n  display: block; text-align: center; padding: 11px 14px;\n  border: 1px solid var(--line); border-radius: 2px;\n  font-size: 13px; color: var(--muted); white-space: nowrap;\n  transition: all .25s var(--ease); user-select: none;\n}\n.opt:hover span { border-color: var(--accent); color: var(--ink); }\n.opt input:checked + span {\n  border-color: var(--accent); background: var(--accent);\n  color: var(--paper); letter-spacing: .01em;\n}\n.opts--grid { display: grid; grid-template-columns: 1fr 1fr; }\n.opts--grid .opt span { white-space: normal; }\n.opt--wide { grid-column: 1 / -1; }\n.other-input { margin-top: 4px; }\n\n.field__hint { font-size: 12px; color: var(--muted); margin: -2px 0 0; }\n\n.rsvp__success {\n  text-align: center; padding: 20px 0 6px; animation: fadeUp .6s var(--ease) both;\n}\n.rsvp__success .script { font-size: 46px; color: var(--accent); }\n@keyframes fadeUp { from { opacity:0; transform: translateY(12px);} to {opacity:1; transform:none;} }\n.hidden { display: none !important; }\n\n/* ============================ GIFTS ================================ */\n.gifts { text-align: center; }\n.gift-card {\n  margin-top: 24px; border: 1px solid var(--line); border-radius: 6px;\n  padding: 30px 24px; background: var(--surface);\n}\n.gift-icon {\n  width: 56px; height: 56px; margin: 0 auto 18px; color: var(--accent);\n}\n.gift-icon svg { width: 100%; height: 100%; }\n.gift-icon .strike { stroke: var(--rose); stroke-width: 2; }\n\n.gift-options {\n  list-style: none; margin: 24px 0 0; padding: 0;\n  display: grid; grid-template-columns: 1fr 1fr; gap: 18px 12px;\n  border-top: 1px solid var(--line); padding-top: 24px;\n}\n.gift-option { display: flex; flex-direction: column; align-items: center; gap: 10px; }\n.gift-option__ic {\n  width: 46px; height: 46px; color: var(--accent-2);\n  display: flex; align-items: center; justify-content: center;\n}\n.gift-option__ic svg { width: 100%; height: 100%; }\n.gift-option__label {\n  font-family: var(--font-caps); text-transform: uppercase;\n  letter-spacing: .1em; font-size: 11px; color: var(--muted); line-height: 1.3;\n}\n\n/* =========================== CONTACTS ============================== */\n.contacts { text-align: center; }\n.org-grid {\n  display: grid; gap: 16px; margin-top: 28px;\n  grid-template-columns: 1fr 1fr;\n}\n.org-grid--stack { grid-template-columns: 1fr; max-width: 360px; margin-left: auto; margin-right: auto; }\n.org {\n  border: 1px solid var(--line); border-radius: 6px; padding: 22px 14px;\n  background: var(--surface);\n}\n.org__role { font-family: var(--font-caps); text-transform: uppercase; letter-spacing: .16em; font-size: 10px; color: var(--accent-2); }\n.org__name { font-family: var(--font-serif); font-size: 22px; font-weight: 500; margin: 6px 0 12px; }\n.org-grid--stack .org__role { margin-bottom: 12px; }\n.org-grid--stack .org__name { margin-top: 0; }\n.org__tel { color: var(--ink); text-decoration: none; font-size: 15px; letter-spacing: .03em; border-bottom: 1px solid var(--line); padding-bottom: 2px; }\n.org__tel:hover { border-color: var(--accent); }\n\n/* ============================ FOOTER =============================== */\n.foot { text-align: center; padding-bottom: 64px; }\n.foot__mono {\n  font-family: var(--font-script); font-size: 40px; color: var(--accent);\n}\n.foot__sub { color: var(--muted); font-size: 12px; letter-spacing: .14em; text-transform: uppercase; margin-top: 6px; }\n\n/* ----------------------- Scroll reveal ----------------------------- */\n.reveal { opacity: 0; transform: translateY(22px); transition: opacity .9s var(--ease), transform .9s var(--ease); }\n.reveal.in { opacity: 1; transform: none; }\n@media (prefers-reduced-motion: reduce) {\n  .reveal { opacity: 1; transform: none; transition: none; }\n  .scroll-cue::after { animation: none; }\n}\n\n/* tweaks panel mount keeps above content */\n#tweaks-root { position: fixed; z-index: 9999; }\n\n/* Tweak: имена антиквой вместо рукописного */\n[data-namefont=\"serif\"] .hero__names,\n[data-namefont=\"serif\"] .hero__date,\n[data-namefont=\"serif\"] .foot__mono,\n[data-namefont=\"serif\"] .rsvp__success .script {\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-weight: 500;\n  letter-spacing: .01em;\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<main class=\"page\">\n\n  <!-- ============================ HERO ============================ -->\n  <section class=\"hero\" data-screen-label=\"Главный экран\">\n    <p class=\"hero__badge\">Save the date<\u002Fp>\n    <div class=\"hero__date\">12.09.2026<\u002Fdiv>\n\n    <img class=\"hero__art\" src=\"e848b615-3df7-464f-8405-f7dcee9d7d91\" alt=\"Иллюстрация: жених и невеста с детскими фотографиями в золотых рамках\">\n\n    <p class=\"hero__join\">Приглашаем вас на нашу свадьбу<\u002Fp>\n    <h1 class=\"hero__names\">Ульяна <span class=\"hero__amp\">&amp;<\u002Fspan> Владислав<\u002Fh1>\n    <p class=\"hero__place\">Киров&nbsp;· база отдыха «Айвенго»<\u002Fp>\n\n    <div class=\"scroll-cue\" aria-hidden=\"true\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ========================= COUNTDOWN ========================= -->\n  <section class=\"countdown reveal\" data-screen-label=\"Таймер\">\n    <p class=\"eyebrow\">До встречи<\u002Fp>\n    <h2 class=\"section-title\">Осталось совсем&nbsp;немного<\u002Fh2>\n    <div class=\"countdown__grid\">\n      <div class=\"cd-cell\"><div class=\"cd-num\" id=\"cd-days\">—<\u002Fdiv><div class=\"cd-lbl\">дней<\u002Fdiv><\u002Fdiv>\n      <div class=\"cd-cell\"><div class=\"cd-num\" id=\"cd-hours\">—<\u002Fdiv><div class=\"cd-lbl\">часов<\u002Fdiv><\u002Fdiv>\n      <div class=\"cd-cell\"><div class=\"cd-num\" id=\"cd-min\">—<\u002Fdiv><div class=\"cd-lbl\">минут<\u002Fdiv><\u002Fdiv>\n      <div class=\"cd-cell\"><div class=\"cd-num\" id=\"cd-sec\">—<\u002Fdiv><div class=\"cd-lbl\">секунд<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ========================== LOCATION ========================= -->\n  <section class=\"location reveal center\" data-screen-label=\"Локация\">\n    <p class=\"eyebrow\">Место<\u002Fp>\n    <h2 class=\"section-title\">Где мы&nbsp;празднуем<\u002Fh2>\n    <p class=\"lead\">Торжество пройдёт за городом, на природе — в окружении леса и тихой воды. Рекомендуем приезжать к&nbsp;15:00.<\u002Fp>\n    <div class=\"loc__card\">\n      <div class=\"map-embed\">\n        <iframe src=\"https://yandex.ru/map-widget/v1/?um=constructor%3APTil6_kXglXLmZAYrOVjjmPogD0xdawx&amp;source=constructor&amp;ll=49.528309%2C58.383111&amp;z=15\" title=\"Карта: база отдыха «Айвенго»\" loading=\"lazy\" allowfullscreen=\"\"><\u002Fiframe>\n      <\u002Fdiv>\n      <div class=\"loc__body\">\n        <div class=\"loc__venue\">База отдыха «Айвенго»<\u002Fdiv>\n        <div class=\"loc__addr\">Кировская область · ~40&nbsp;мин от центра Кирова<\u002Fdiv>\n        <a class=\"btn\" href=\"https://yandex.ru/maps/?ll=49.528309%2C58.383111&amp;mode=usermaps&amp;um=constructor%3APTil6_kXglXLmZAYrOVjjmPogD0xdawx&amp;z=15.4\" target=\"_blank\" rel=\"noopener\">Построить маршрут<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =========================== TIMING ========================== -->\n  <section class=\"timing reveal center\" data-screen-label=\"Сбор гостей\">\n    <p class=\"eyebrow\">Сбор гостей<\u002Fp>\n    <h2 class=\"section-title\">Во сколько приезжать<\u002Fh2>\n    <div class=\"timing__hero\">\n      <span class=\"timing__lead-in\">Мы будем ждать вас к<\u002Fspan>\n      <span class=\"timing__big\">15:00<\u002Fspan>\n    <\u002Fdiv>\n    <p class=\"lead\" style=\"margin-inline:auto\">Пожалуйста, заложите немного времени на дорогу, чтобы приехать спокойно и без спешки.<\u002Fp>\n    <div class=\"secret-card\">\n      <span class=\"secret-card__label\">P.S. секрет<\u002Fspan>\n      <p>Для гостей, которые дружат со временем не всегда, объявляем секретный сбор в <strong>14:00<\u002Fstrong> :)<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ========================= DRESS CODE ======================== -->\n  <section class=\"dress reveal\" data-screen-label=\"Дресс-код\">\n    <p class=\"eyebrow\">Дресс-код<\u002Fp>\n    <h2 class=\"section-title\">Просто будьте собой<\u002Fh2>\n    <p class=\"lead\" style=\"margin-inline:auto\">Дресс-код максимально простой: <strong>быть собой<\u002Fstrong>.<\u002Fp>\n    <div class=\"flourish\"><span class=\"dot\"><\u002Fspan><\u002Fdiv>\n    <p class=\"lead\" style=\"margin-inline:auto\">Невеста будет в белом платье, а все остальные — в том, в чём им комфортно, красиво и хочется праздновать.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ============================ RSVP =========================== -->\n  <section class=\"rsvp reveal center\" id=\"rsvp\" data-screen-label=\"RSVP\">\n    <p class=\"eyebrow\">R.S.V.P.<\u002Fp>\n    <h2 class=\"section-title\">Подтвердите присутствие<\u002Fh2>\n    <p class=\"lead\" style=\"margin-inline:auto\">Пожалуйста, дайте знать о своём решении до <strong>1&nbsp;августа&nbsp;2026<\u002Fstrong>.<\u002Fp>\n\n    <form class=\"rsvp__form\" id=\"rsvp-form\" style=\"text-align:left\">\n      <div class=\"field\">\n        <label class=\"field__q\" for=\"guest\">Ваше имя и фамилия<\u002Flabel>\n        <input type=\"text\" id=\"guest\" name=\"guest\" placeholder=\"Например, Анна Петрова\" autocomplete=\"name\">\n      <\u002Fdiv>\n\n      <div class=\"field\">\n        <span class=\"field__q\">Придёте ли вы?<\u002Fspan>\n        <div class=\"opts attend-opts\">\n          <label class=\"opt\"><input type=\"radio\" name=\"attend\" value=\"yes\"><span>Да, с радостью<\u002Fspan><\u002Flabel>\n          <label class=\"opt\"><input type=\"radio\" name=\"attend\" value=\"no\"><span>К сожалению, нет<\u002Fspan><\u002Flabel>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div id=\"rsvp-conditional\" style=\"display:flex;flex-direction:column;gap:22px\">\n        <div class=\"field\">\n          <span class=\"field__q\">Вы будете<\u002Fspan>\n          <div class=\"opts\">\n            <label class=\"opt\"><input type=\"radio\" name=\"companion\" value=\"solo\"><span>Один / одна<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"companion\" value=\"couple\"><span>С парой<\u002Fspan><\u002Flabel>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"field\">\n          <span class=\"field__q\">Предпочтения в напитках<\u002Fspan>\n          <p class=\"field__hint\">Можно выбрать несколько<\u002Fp>\n          <div class=\"opts opts--grid\">\n            <label class=\"opt\"><input type=\"checkbox\" name=\"alcohol\" value=\"wine-white\"><span>Вино белое<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"checkbox\" name=\"alcohol\" value=\"wine-red\"><span>Вино красное<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"checkbox\" name=\"alcohol\" value=\"dry\"><span>Сухое<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"checkbox\" name=\"alcohol\" value=\"semisweet\"><span>Полусладкое<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"checkbox\" name=\"alcohol\" value=\"vodka\"><span>Водка<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"checkbox\" name=\"alcohol\" value=\"none\"><span>Безалкогольное<\u002Fspan><\u002Flabel>\n            <label class=\"opt opt--wide\"><input type=\"checkbox\" name=\"alcohol\" value=\"other\" id=\"alcohol-other\"><span>Другое<\u002Fspan><\u002Flabel>\n          <\u002Fdiv>\n          <input type=\"text\" id=\"alcohol-other-text\" name=\"alcohol_other\" class=\"other-input hidden\" placeholder=\"Впишите ваше пожелание\">\n        <\u002Fdiv>\n\n        <div class=\"field\">\n          <span class=\"field__q\">Нужен ли трансфер?<\u002Fspan>\n          <div class=\"opts\">\n            <label class=\"opt\"><input type=\"radio\" name=\"transfer\" value=\"yes\"><span>Да, нужен<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"transfer\" value=\"no\"><span>Доберусь сам<\u002Fspan><\u002Flabel>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"field\">\n          <span class=\"field__q\">Останетесь на второй день?<\u002Fspan>\n          <div class=\"opts\">\n            <label class=\"opt\"><input type=\"radio\" name=\"day2\" value=\"yes\"><span>Да<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"day2\" value=\"no\"><span>Нет<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"day2\" value=\"maybe\"><span>Пока не знаю<\u002Fspan><\u002Flabel>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"field__hint hidden\" id=\"rsvp-decline-note\">Будем грустить без вас, но спасибо, что ответили 🤍<\u002Fp>\n\n      <button type=\"submit\" class=\"btn btn--solid btn--full\">Отправить ответ<\u002Fbutton>\n    <\u002Fform>\n\n    <div class=\"rsvp__success hidden\" id=\"rsvp-thanks\">\n      <div class=\"script\" id=\"rsvp-thanks-name\">Спасибо!<\u002Fdiv>\n      <p class=\"lead\" id=\"rsvp-thanks-msg\" style=\"margin-inline:auto\"><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =========================== GIFTS =========================== -->\n  <section class=\"gifts reveal\" data-screen-label=\"Подарки\">\n    <h2 class=\"section-title\">Немного о&nbsp;подарках<\u002Fh2>\n    <div class=\"gift-card\">\n      <div class=\"gift-icon gift-icon--no-flowers\" aria-hidden=\"true\">\n        <svg viewBox=\"0 0 48 48\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"22\" cy=\"16\" r=\"3.2\"><\u002Fcircle>\n          <ellipse cx=\"22\" cy=\"8.5\" rx=\"2.6\" ry=\"     <span class=\"gift-option__ic\" aria-hidden=\"true\">\n            <svg viewBox=\"0 0 48 48\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <path d=\"M21 7h6v6.5c0 1 .3 1.6.9 2.4l2.4 3c.9 1.1 1.2 2 1.2 3.4V38a3 3 0 0 1-3 3H19.5a3 3 0 0 1-3-3V22.3c0-1.4.3-2.3 1.2-3.4l2.4-3c.6-.8.9-1.4.9-2.4V7z\"><\u002Fpath>\n              <line x1=\"16.5\" y1=\"26\" x2=\"31.5\" y2=\"26\"><\u002Fline>\n              <line x1=\"21\" y1=\"7\" x2=\"27\" y2=\"7\"><\u002Fline>\n            <\u002Fsvg>\n          <\u002Fspan>\n          <span class=\"gift-option__label\">Бутылка вина<\u002Fspan>\n        <\u002Fli>\n        <li class=\"gift-option\">\n          <span class=\"gift-option__ic\" aria-hidden=\"true\">\n            <svg viewBox=\"0 0 48 48\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <rect x=\"9\" y=\"10\" width=\"30\" height=\"22\" rx=\"2\"><\u002Frect>\n              <line x1=\"14\" y1=\"17\" x2=\"26\" y2=\"17\"><\u002Fline>\n              <line x1=\"14\" y1=\"23\" x2=\"22\" y2=\"23\"><\u002Fline>\n              <circle cx=\"32\" cy=\"36\" r=\"5\"><\u002Fcircle>\n              <path d=\"M30 40l-1.5 4 3.5-2 3.5 2-1.5-4\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fspan>\n          <span class=\"gift-option__label\">Сертификат<\u002Fspan>\n        <\u002Fli>\n        <li class=\"gift-option\">\n          <span class=\"gift-option__ic\" aria-hidden=\"true\">\n            <svg viewBox=\"0 0 48 48\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <rect x=\"10\" y=\"17\" width=\"28\" height=\"21\" rx=\"2.5\"><\u002Frect>\n              <path d=\"M18 17v-3a3 3 0 0 1 3-3h6a3 3 0 0 1 3 3v3\"><\u002Fpath>\n              <line x1=\"10\" y1=\"24\" x2=\"38\" y2=\"24\"><\u002Fline>\n              <line x1=\"22\" y1=\"24\" x2=\"22\" y2=\"
